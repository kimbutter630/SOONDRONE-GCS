version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: soondrone-postgres
    environment:
      POSTGRES_DB: soondrone_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed_database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - soondrone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: soondrone-redis
    ports:
      - "6379:6379"
    networks:
      - soondrone-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: soondrone-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: soondrone_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    networks:
      - soondrone-network
    command: npm run dev

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: soondrone-dashboard
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:3000/api
      REACT_APP_WS_URL: ws://localhost:3000/ws
    depends_on:
      - backend
    volumes:
      - ./admin-dashboard/src:/app/src
      - ./admin-dashboard/public:/app/public
    networks:
      - soondrone-network

volumes:
  postgres_data:

networks:
  soondrone-network:
    driver: bridge
